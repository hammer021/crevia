name: kmob
description: A new Flutter project.

version: 1.0.5+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Push Notifications
  # onesignal_flutter: ^5.1.4
  onesignal_flutter: ^5.2.3

  # Device & Info
  package_info_plus: ^8.0.0
  device_info_plus: ^11.0.0
  path_provider: ^2.1.2

  # UI
  fluttertoast: ^8.2.4
  badges: ^3.1.2
  photo_view: ^0.15.0
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  qr_flutter: ^4.1.0
  rflutter_alert: ^2.0.7
  signature: ^5.5.0

  # File & Storage
  flutter_file_dialog: ^3.0.2
  # flutter_pdfview: ^1.3.0
  syncfusion_flutter_pdfviewer: ^28.1.38
  file_picker: ^8.1.2
  firebase_storage: ^12.2.0

  # Network
  dio: ^5.7.0
  http: ^1.2.2

  # Location
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.5.0
  firebase_analytics: ^11.2.0

  # Widgets & Utils
  # flutter_datetime_picker: ^1.5.1
  flutter_datetime_picker_plus: ^2.2.0
  intl: ^0.19.0
  # intl: ^0.17.0
  url_launcher: ^6.3.1

  # Barcode & Scanner
  # barcode_scan2: ^4.3.0
  # mobile_scanner: ^5.2.3
  mobile_scanner: ^7.0.1
  barcode_widget: ^2.0.4

  # Charts
  # charts_flutter: ^0.12.0
  # charts_flutter_new: any
  syncfusion_flutter_charts: ^28.1.38

  # charts_flutter:
  #   git:
  #     url: https://github.com/google/charts.git
  #     path: charts_flutter
  # Camera & Image
  image_picker: ^1.1.2

  # OTP
  # sms_otp_auto_verify: ^2.1.0
  # flutter_sms_autofill: ^1.0.4
  passcode_screen: ^2.0.0

  # WebView
  # flutter_inappwebview: ^6.1.5
  # flutter_inappwebview: ^6.1.6+4
  flutter_inappwebview: ^6.2.0-beta.2

  # ML Kit
  # google_mlkit_text_recognition: ^0.11.0
  google_mlkit_text_recognition: ^0.15.0

  # Others
  filter_list: ^0.0.4
  json_table: ^2.0.0
  #loading: ^2.0.0
  flutter_spinkit: ^5.2.0
  in_app_update: ^4.2.3
  shared_preferences: ^2.3.2
  html: ^0.15.5
  loading_indicator: ^3.1.1
  pinput: ^5.0.0
  modal_progress_hud_nsn: ^0.5.1
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/img/crevia-logo.png"
flutter:
  uses-material-design: true

  assets:
    - assets/img/header.jpg
    - assets/img/logok3pg.png
    - assets/img/logo.jpg
    - assets/img/crevia-logo.png
    - assets/img/profilebg.jpg
    - assets/img/profile.png
    - assets/images/food_1.jpg
    - assets/images/food_2.jpg
    - assets/images/food_3.jpg
    - assets/images/food_4.jpg
    - assets/images/food_5.jpg
    - assets/images/promo_1.jpg
    - assets/images/promo_2.jpg
    - assets/images/promo_3.jpg
    - assets/images/promo_4.jpg
    - assets/img/loading.gif
    - assets/img/otp-icon.png
    - assets/img/delete.png
    - assets/img/success.png

  fonts:
    - family: WorkSansSemiBold
      fonts:
        - asset: assets/fonts/Work_Sans/WorkSans-SemiBold.ttf
    - family: WorkSansBold
      fonts:
        - asset: assets/fonts/Work_Sans/WorkSans-Bold.ttf
    - family: WorkSansMedium
      fonts:
        - asset: assets/fonts/Work_Sans/WorkSans-Medium.ttf
    - family: WorkSansLight
      fonts:
        - asset: assets/fonts/Work_Sans/WorkSans-Light.ttf
    - family: NeoSans
      fonts:
        - asset: assets/fonts/NeoSans/NeoSansStd-Regular.otf
    - family: NeoSansBold
      fonts:
        - asset: assets/fonts/NeoSans/NeoSansStd-Bold.otf
